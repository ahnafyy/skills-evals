name: behavioral-evals

# Tier 3 — runs a real GitHub Copilot agent against our skills in a throwaway
# workspace and grades the execution trace. This is the eval that actually
# catches "the skill's advice no longer produces correct behavior". It spends
# Copilot usage, so it runs on a schedule and on demand — never on PRs.

on:
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC every Monday
  workflow_dispatch:
    inputs:
      artifact:
        description: 'Artifact name to run behavioral evals for'
        required: true
        default: 'setup-skills-evals'

permissions:
  contents: read

concurrency:
  group: behavioral-evals
  cancel-in-progress: false

jobs:
  behavioral:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARTIFACT: ${{ github.event.inputs.artifact || 'setup-skills-evals' }}
      # A GitHub token from an account with Copilot access. Store it as the
      # COPILOT_CLI_TOKEN repo secret — the built-in GITHUB_TOKEN cannot use Copilot.
      GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install the GitHub Copilot CLI
        run: npm install -g @github/copilot
      - name: Run behavioral evals (Copilot as executor + grader)
        run: node bin/skills-evals.js behavioral "$ARTIFACT" --adapter copilot --grader copilot
      - name: Upload gradings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-gradings
          path: .skills-evals/results/
          if-no-files-found: ignore
