name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests
        run: npm test
      - name: Dogfood (fixture repo)
        run: node bin/skills-evals.js run --root test/fixtures/sample-repo
      - name: Dogfood (validate)
        run: node bin/skills-evals.js validate --root test/fixtures/sample-repo
